<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepNeural</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/indexcss.css">
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <a href="/" class="logo">DeepNeural</a>
        </div>
        <div class="user-info">
            <h3 id="username-display">User</h3>
            <p id="user-email-display">user@example.com</p>
        </div>
        <nav class="nav-links">
            <a href="#" class="nav-link active" id="new-chat">
                <span class="material-icons">chat</span>
                New Chat
            </a>
            <!-- <a href="#" class="nav-link" id="history-link">
                <span class="material-icons">history</span>
                History
            </a> -->
            <a href="/settings.html" class="nav-link">
                <span class="material-icons">settings</span>
                Settings
            </a>
            <a href="javascript:void(0);" class="nav-link" id="logout-btn" onclick="logout(); return false;">
                <span class="material-icons">logout</span>
                Logout
            </a>
        </nav>
        <div class="theme-toggle" id="theme-toggle">
            <span class="material-icons">dark_mode</span>
            <span>Dark Mode</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="chat-container">
            <div class="chat-header">
                <h2>New Chat</h2>
                <button class="clear-chat">
                    <span class="material-icons">delete</span>
                </button>
            </div>
            <div class="chat-messages" id="messageContainer">
                <!-- Messages will be added here dynamically -->
            </div>
            <form id="chat-form" class="chat-input">
                <input type="text" id="userInput" name="userInput" placeholder="Type your message here..." required
                    autocomplete="off">
                <button type="submit">
                    <span class="material-icons">send</span>
                </button>
            </form>
        </div>
    </div>

    <script src="assets/js/indexscript.js"></script>
</body>

</html>
